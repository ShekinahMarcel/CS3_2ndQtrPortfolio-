<!DOCTYPE html>
<html>
<head>
<title>Movie List Kineme</title>
<link rel="stylesheet" href="q41style.css">
</head>

<body>

<div class="box">

<h2>Add / Update a Movie~!</h2>

<label>Title:</label>
<input id="movieTitle">

<label>Year:</label>
<input id="movieYear">

<label>Genre:</label>
<select id="movieGenre">
<option>Action</option>
<option>Comedy</option>
<option>Drama</option>
<option>Sci-Fi</option>
<option>Fantasy</option>
<option>Romance</option>
<option>Horror</option>
<option>Thriller</option>
</select>

<label>Rating:</label>
<div id="starPlace">
<span class="star" data-num="1">★</span>
<span class="star" data-num="2">★</span>
<span class="star" data-num="3">★</span>
<span class="star" data-num="4">★</span>
<span class="star" data-num="5">★</span>
</div>

<br>
<button onclick="addMovieThing()">Add Movie</button>

<h3>Movie List</h3>

<div id="movieList"></div>
</div>

<script>

let chosenRating = 0;
let stars = document.querySelectorAll(".star");

stars.forEach(function(e){
    e.addEventListener("click", function(){

        chosenRating = this.dataset.num;

        stars.forEach(function(a){
            a.classList.remove("starcolor");
        });

        for(let e = 0; e < chosenRating; e++){
            stars[e].classList.add("starcolor");
        }

    });
});


function addMovieThing(){

let title = document.getElementById("movieTitle").value;
let year = document.getElementById("movieYear").value;
let genre = document.getElementById("movieGenre").value;

if(title == "" || year == "" || chosenRating == 0){
    alert("pls fill everything");
    return;
}

let movieStuff = localStorage.getItem("movies");

if(movieStuff == null){
    movieStuff = [];
}else{
    movieStuff = JSON.parse(movieStuff);
}

let found = false;

movieStuff.forEach(function(e){

    if(e.title.toLowerCase() == title.toLowerCase()){

        e.year = year;
        e.genre = genre;

        let newRate = (parseInt(e.rating) + parseInt(chosenRating)) / 2;
        e.rating = Math.round(newRate);

        found = true;
    }

});


if(!found){

    let newMovie = {
        title: title,
        year: year,
        genre: genre,
        rating: chosenRating
    };

    movieStuff.push(newMovie);

}

localStorage.setItem("movies", JSON.stringify(movieStuff));

showMovies();

}


function showMovies(){

let spot = document.getElementById("movieList");

let movieStuff = localStorage.getItem("movies");

if(movieStuff == null){
    return;
}

movieStuff = JSON.parse(movieStuff);

spot.innerHTML = "";

movieStuff.forEach(function(e, index){

let stars = "";

for(let e2 = 0; e2 < e.rating; e2++){
    stars += "<span class='starcolor'>★</span>";
}

let thing = document.createElement("div");
thing.className = "movieItem";

thing.innerHTML =
e.title + " (" + e.year + ") - " +
e.genre + ", Rating: " + stars +
" <button onclick='deleteMovie(" + index + ")'>Delete</button>";

spot.appendChild(thing);

});

}

function deleteMovie(e){

let sure = confirm("are you sure you want to delete?");

if(!sure){
    return;
}

let movieStuff = localStorage.getItem("movies");

if(movieStuff == null){
    return;
}

movieStuff = JSON.parse(movieStuff);

movieStuff.splice(e,1);

localStorage.setItem("movies", JSON.stringify(movieStuff));

showMovies();

}


window.onload = function(){
showMovies();
}

</script>

</body>
</html>
